name: Pre-commit

on:
  pull_request:
  push:
    branches: [main, development]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.19'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
